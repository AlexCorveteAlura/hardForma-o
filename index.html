<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oficina Audiovisual IA - Rock & Code</title>
    <style>
        /* --- CSS (ESTILO) --- */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Arial Black', Gadget, sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* Plano de Fundo */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('fundo.png'); 
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        /* Layout Principal em duas colunas */
        .main-wrapper {
            display: flex;
            flex-direction: row; /* Alinha os itens lado a lado */
            align-items: center;
            justify-content: flex-start; /* Alinha ao início (esquerda) */
            min-height: 100vh;
            padding: 50px;
            box-sizing: border-box;
            gap: 40px; /* Espaço entre o vídeo e o conteúdo da direita */
        }

        /* Responsividade para telas menores (celular) */
        @media (max-width: 900px) {
            .main-wrapper {
                flex-direction: column;
                justify-content: center;
                padding: 20px;
            }
        }

        /* Lado Esquerdo: Vídeo */
        .video-box {
            flex: 1; /* Faz o vídeo ocupar espaço flexível */
            width: 100%;
            max-width: 700px; 
            aspect-ratio: 16 / 9;
            background: #000;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
            overflow: hidden;
        }

        .video-box iframe {
            width: 100%;
            height: 100%;
        }

        /* Lado Direito: Título e Player */
        .content-right {
            flex: 1;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        h1 {
            text-shadow: 2px 2px 10px rgba(0,0,0,1);
            margin-bottom: 30px;
            font-size: 2rem;
            text-transform: uppercase;
            text-align: left;
        }

        /* Player de Áudio Transparente */
        .audio-player {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        .controls-btns {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .btn:hover { background: #ff0000; transform: scale(1.1); }
        .btn svg { fill: #333; width: 20px; }
        .btn:hover svg { fill: white; }

        .timeline-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: #ff0000; 
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>
    <div class="overlay"></div>

    <div class="main-wrapper">
        
        <div class="video-box">
            <iframe 
                width="1335" 
                height="751" 
                src="https://www.youtube.com/embed/1cILBcpv2fw?list=RD1cILBcpv2fw" 
                title="Judas Priest - Breaking The Law (Live at the Seminole Hard Rock Arena)" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                referrerpolicy="strict-origin-when-cross-origin" 
                allowfullscreen>
            </iframe>
        </div>

        <div class="content-right">
            <h1>Oficina IA:<br>Gemini, Suno & GitHub</h1>

            <div class="audio-player">
                <audio id="audio" src="musica.mp3"></audio>
                
                <div class="controls-btns">
                    <button class="btn" id="playPauseBtn" title="Play">
                        <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        <svg id="pauseIcon" style="display:none;" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </button>
                    <button class="btn" id="stopBtn" title="Stop">
                        <svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
                    </button>
                </div>

                <div class="timeline-container">
                    <input type="range" id="seek" value="0" max="100">
                </div>
            </div>
        </div>

    </div>

    <script>
        const audio = document.getElementById('audio');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const seek = document.getElementById('seek');

        playPauseBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            } else {
                audio.pause();
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            }
        });

        stopBtn.addEventListener('click', () => {
            audio.pause();
            audio.currentTime = 0;
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
        });

        audio.addEventListener('timeupdate', () => {
            const value = (audio.currentTime / audio.duration) * 100;
            seek.value = value || 0;
        });

        seek.addEventListener('input', () => {
            const time = (seek.value / 100) * audio.duration;
            audio.currentTime = time;
        });
    </script>
</body>
</html>
